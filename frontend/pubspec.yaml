name: frontend
description: "AfriLens - AI Cultural Exploration"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  lucide_icons: ^0.257.0
  provider: ^6.1.5
  image_picker: ^1.1.2
  http: ^1.3.0
  http_parser: ^4.1.0
  mobile_scanner: ^6.0.4
  shared_preferences: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_white.png"
  adaptive_icon_background: "#0D0D0D"
  adaptive_icon_foreground: "assets/images/logo_white.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
