<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Kuriftu AI Cultural Whisperer — Discover African Heritage">

  <!-- Cache control to prevent stale canvaskit.js -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Kuriftu Cultural Whisperer">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Kuriftu Cultural Whisperer</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Loading / error fallback styles */
    body { margin: 0; background: #0a0a0a; }
    #loading-indicator {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #d4af37;
    }
    #loading-indicator .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(212, 175, 55, 0.2);
      border-top-color: #d4af37;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    #loading-indicator p { margin-top: 16px; font-size: 14px; opacity: 0.7; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error-display {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      flex-direction: column; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #ccc; background: #0a0a0a; padding: 40px; text-align: center;
    }
    #error-display h2 { color: #d4af37; margin-bottom: 12px; }
    #error-display p { max-width: 400px; line-height: 1.6; }
    #error-display button {
      margin-top: 20px; padding: 10px 28px; background: #d4af37; color: #0a0a0a;
      border: none; border-radius: 20px; font-weight: 600; cursor: pointer; font-size: 14px;
    }
  </style>
</head>
<body>
  <!-- Loading indicator while Flutter boots -->
  <div id="loading-indicator">
    <div class="spinner"></div>
    <p>Loading Cultural Whisperer…</p>
  </div>

  <!-- Fallback error display for CanvasKit / JS failures -->
  <div id="error-display">
    <h2>Unable to Load App</h2>
    <p>The application failed to initialize. This can happen due to a stale browser cache or a network issue loading CanvasKit.</p>
    <button onclick="location.reload(true)">Reload Page</button>
  </div>

  <script>
    // Global error handler for module load failures
    window.addEventListener('error', function(e) {
      if (e.message && (
        e.message.includes('canvaskit') ||
        e.message.includes('CanvasKit') ||
        e.message.includes('WebAssembly') ||
        e.message.includes('Failed to fetch') ||
        e.message.includes('Loading chunk')
      )) {
        console.error('[Kuriftu] Renderer load failure:', e.message);
        var loading = document.getElementById('loading-indicator');
        var errorDiv = document.getElementById('error-display');
        if (loading) loading.style.display = 'none';
        if (errorDiv) errorDiv.style.display = 'flex';
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async
    onerror="
      console.error('[Kuriftu] flutter_bootstrap.js failed to load');
      document.getElementById('loading-indicator').style.display='none';
      document.getElementById('error-display').style.display='flex';
    ">
  </script>


</body>
</html>
