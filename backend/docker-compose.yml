services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - .env
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-afrilens_ai}
      - POSTGRES_USER=${POSTGRES_USER:-afrilens_ai_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-afrilens_ai_pass}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-afrilens_ai_user} -d ${POSTGRES_DB:-afrilens_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: django_app
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-afrilens_ai_user}:${POSTGRES_PASSWORD:-afrilens_ai_pass}@db:5432/${POSTGRES_DB:-afrilens_ai}
      - DEBUG=${DEBUG:-False}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    expose:
      - "8000"

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume: