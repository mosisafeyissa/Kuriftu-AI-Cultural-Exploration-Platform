services:
  # ── Django Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
    volumes:
      - db_data:/app/db # Persisted SQLite database
      - media_data:/app/media # User-uploaded media
      - static_data:/app/staticfiles # Collected static files
    expose:
      - "8000"
    # Runs migrations + collectstatic, then starts Gunicorn
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/artifacts/')\"" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Flutter Frontend served via Nginx ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - media_data:/app/media:ro # Read-only access to media
      - static_data:/app/staticfiles:ro # Read-only access to static files

